services:

  db:
    image: postgres:16
    container_name: defisante_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-defisante}
      POSTGRES_USER: ${POSTGRES_USER:-defisante_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-defisante_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-defisante_user} -d ${POSTGRES_DB:-defisante}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: defisante_api
    restart: unless-stopped
    environment:
      FLASK_ENV: ${FLASK_ENV:-development}
      FLASK_DEBUG: ${FLASK_DEBUG:-1}
      DATABASE_URL: postgresql://${POSTGRES_USER:-defisante_user}:${POSTGRES_PASSWORD:-defisante_pass}@db:5432/${POSTGRES_DB:-defisante}
      SECRET_KEY: ${SECRET_KEY:-changez_moi_en_production}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-jwt_secret_changez_moi}
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
    driver: local
