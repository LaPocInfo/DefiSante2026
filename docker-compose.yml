version: "3.9"

services:

  # ─── Base de données PostgreSQL ───────────────────────────────────────────
  db:
    image: postgres:16
    container_name: defisante_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-defisante}
      POSTGRES_USER: ${POSTGRES_USER:-defisante_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-defisante_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql   # script d'initialisation optionnel
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-defisante_user} -d ${POSTGRES_DB:-defisante}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── API Flask ────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: defisante_api
    restart: unless-stopped
    environment:
      FLASK_ENV: ${FLASK_ENV:-development}
      FLASK_DEBUG: ${FLASK_DEBUG:-1}
      DATABASE_URL: postgresql://${POSTGRES_USER:-defisante_user}:${POSTGRES_PASSWORD:-defisante_pass}@db:5432/${POSTGRES_DB:-defisante}
      SECRET_KEY: ${SECRET_KEY:-changez_moi_en_production}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-jwt_secret_changez_moi}
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app                  # montage du code source pour hot-reload en dev

  # ─── pgAdmin (interface admin pour PostgreSQL) ────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: defisante_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@defisante.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "5050:80"
    depends_on:
      - db
    profiles:
      - dev           # lancé uniquement avec : docker compose --profile dev up

volumes:
  postgres_data:
    driver: local
