services:

  db:
    image: postgres:16
    container_name: defisante_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: defisante
      POSTGRES_USER: defisante_user
      POSTGRES_PASSWORD: defisante_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U defisante_user -d defisante"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: defisante_api
    restart: unless-stopped
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
    driver: local
